<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stimuli - Test images</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 32px;
      background: #f5f5f5;
      color: #222;
      text-align: center;
    }
    .card {
      max-width: 760px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.10);
    }
    img {
      max-width: 100%;
      max-height: 520px;
      object-fit: contain;
      margin: 18px 0;
    }
    .buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }
    button {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      background: #3C6172;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }
    .rating-btn {
      width: 48px;
      height: 48px;
      padding: 0;
      background: #ddd;
      color: #222;
    }
    .rating-btn:hover { background: #bbb; }
    .small {
      color: #555;
      font-size: 14px;
    }
    .error {
      color: #b00020;
      font-weight: bold;
    }
    .results {
      text-align: left;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }
    th, td {
      border-bottom: 1px solid #ddd;
      padding: 8px;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Test des stimuli</h1>
    <p class="small">
      Cette page vérifie que le tirage fonctionne : 3 images faibles, 3 moyennes, 3 élevées, puis ordre aléatoire.
    </p>

    <div id="app"></div>
  </div>

  <script>
    // ======================================================
    // PARAMÈTRES À ADAPTER
    // ======================================================
    const N_IMAGES_PAR_CATEGORIE = 300;
    const N_A_TIRER_PAR_CATEGORIE = 3;

    // Les chemins sont relatifs à index.html.
    // Structure attendue :
    // images_generees/faible/faible_001.png
    // images_generees/moyen/moyen_001.png
    // images_generees/eleve/eleve_001.png
    const BASE_PATH = "images_generees/";

    const CATEGORIES = [
      { key: "faible", folder: "faible", prefix: "faible", label: "faible" },
      { key: "moyen", folder: "moyen", prefix: "moyen", label: "moyen" },
      { key: "eleve", folder: "eleve", prefix: "eleve", label: "élevé" }
    ];

    // ======================================================
    // FONCTIONS
    // ======================================================
    function padNumber(n) {
      return String(n).padStart(3, "0");
    }

    function buildImageList(category) {
      const images = [];
      for (let i = 1; i <= N_IMAGES_PAR_CATEGORIE; i++) {
        const num = padNumber(i);
        const id = category.prefix + "_" + num;
        images.push({
          id: id,
          niveau: category.label,
          url: BASE_PATH + category.folder + "/" + id + ".png"
        });
      }
      return images;
    }

    function shuffle(array) {
      const copy = array.slice();
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function pickRandom(array, n) {
      return shuffle(array).slice(0, n);
    }

    function createStimuliBank() {
      let selected = [];
      CATEGORIES.forEach(cat => {
        const list = buildImageList(cat);
        selected = selected.concat(pickRandom(list, N_A_TIRER_PAR_CATEGORIE));
      });
      return shuffle(selected);
    }

    function downloadCSV(rows) {
      const header = ["ordre", "image_id", "niveau", "rating", "url"];
      const csv = [header.join(",")].concat(
        rows.map(row => [
          row.ordre,
          row.image_id,
          row.niveau,
          row.rating,
          row.url
        ].map(value => '"' + String(value).replaceAll('"', '""') + '"').join(","))
      ).join("\n");

      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "resultats_test_stimuli.csv";
      link.click();
    }

    // ======================================================
    // INTERFACE
    // ======================================================
    const app = document.getElementById("app");
    const stimuli = createStimuliBank();
    let currentIndex = 0;
    const results = [];

    function renderCurrentImage() {
      const img = stimuli[currentIndex];
      app.innerHTML = `
        <p><strong>Image ${currentIndex + 1} / ${stimuli.length}</strong></p>
        <img src="${img.url}" alt="${img.id}" onerror="document.getElementById('img-error').style.display='block'">
        <p id="img-error" class="error" style="display:none;">
          Image introuvable : ${img.url}<br>
          Vérifie le nom du fichier et le dossier.
        </p>
        <p>How much do you think society would judge this outfit as acceptable?</p>
        <p class="small">1 = Totally acceptable &nbsp;&nbsp; | &nbsp;&nbsp; 7 = Totally unacceptable</p>
        <div class="buttons">
          ${[1,2,3,4,5,6,7].map(n => `<button class="rating-btn" onclick="rateImage(${n})">${n}</button>`).join("")}
        </div>
      `;
    }

    window.rateImage = function(score) {
      const img = stimuli[currentIndex];
      results.push({
        ordre: currentIndex + 1,
        image_id: img.id,
        niveau: img.niveau,
        rating: score,
        url: img.url
      });

      currentIndex++;

      if (currentIndex < stimuli.length) {
        renderCurrentImage();
      } else {
        renderResults();
      }
    }

    function renderResults() {
      app.innerHTML = `
        <h2>Test terminé</h2>
        <p>Les 9 images ont été notées.</p>
        <button onclick='downloadCSV(results)'>Télécharger le CSV test</button>
        <div class="results">
          <table>
            <thead>
              <tr>
                <th>Ordre</th>
                <th>Image</th>
                <th>Niveau</th>
                <th>Note</th>
              </tr>
            </thead>
            <tbody>
              ${results.map(r => `
                <tr>
                  <td>${r.ordre}</td>
                  <td>${r.image_id}</td>
                  <td>${r.niveau}</td>
                  <td>${r.rating}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    renderCurrentImage();
  </script>
</body>
</html>
